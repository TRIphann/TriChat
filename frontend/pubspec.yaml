name: frontend
description: "TriChat - Lightweight messaging application"
publish_to: "none"

version: 1.0.0+1

environment:
  sdk: ^3.11.1

dependencies:
  flutter:
    sdk: flutter

  go_router: ^17.1.0
  cupertino_icons: ^1.0.8

  firebase_core: ^2.31.0
  firebase_auth: ^4.19.0
  cloud_firestore: ^4.17.5
  firebase_messaging: ^14.9.4
  flutter_local_notifications: ^17.2.4
  flutter_callkeep: ^1.0.0
  uuid: ^4.5.1

  bloc: ^9.2.0
  flutter_bloc: ^9.1.1

  http: ^1.6.0
  dio: ^5.7.0

  provider: ^6.1.1
  camera: ^0.10.5+5
  permission_handler: ^12.0.3
  flutter_ringtone_player: ^4.0.0+4
  signalr_netcore: ^1.4.4
  record: ^5.1.2
  audioplayers: ^6.0.0
  path_provider: ^2.1.3

  intl: ^0.19.0
  image_picker: ^1.1.2

  agora_rtc_engine: ^6.3.2
  agora_token_generator: ^1.0.0
  flutter_dotenv: ^6.0.1

  qr_flutter: ^4.1.0
  mobile_scanner: ^5.2.3

  #calenda
  table_calendar: ^3.1.2
  scrollable_positioned_list: ^0.3.8

  # location and map
  geolocator: ^12.0.0
  url_launcher: ^6.3.2
  flutter_map: ^8.3.0
  latlong2: ^0.9.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

dependency_overrides:
  record_platform_interface: 1.2.0

flutter:
  uses-material-design: true
  assets:
    - .env
