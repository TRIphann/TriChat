# docker-compose.yml — local development stack for TriChat.
#
# Brings up Redis + the backend container with secrets from .env.
# Run from the REPO ROOT (parent folder of backend/ and frontend/):
#
#   cp .env.example .env       # then edit values
#   # generate base64 of your firebase key once:
#   pwsh scripts/encode-firebase-key.ps1
#   docker compose up --build
#
# Backend is reachable at http://localhost:5244, Redis at localhost:6379.

services:
  redis:
    image: redis:7-alpine
    container_name: trichat-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  backend:
    build:
      context: ./backend           # build context = backend/
      dockerfile: Dockerfile
    container_name: trichat-backend
    restart: unless-stopped
    depends_on:
      redis:
        condition: service_healthy
    ports:
      - "5244:5244"
    env_file:
      - .env                       # secrets live in repo-root .env
    environment:
      # Redis: use Upstash REST URL (https://console.upstash.com) or
      # the Docker DNS name "redis" if running locally with docker-compose.
      Redis__ConnectString: "${REDIS_CONNECT_STRING:-redis:6379}"
      Redis__RestUrl: "${REDIS_REST_URL:-}"
      Redis__RestToken: "${REDIS_REST_TOKEN:-}"
      # Resend for OTP email delivery (port 443 — not blocked by Render).
      # API key from https://resend.com/api-keys
      Resend__ApiKey: "${RESEND_API_KEY:-}"
      Resend__From: "${RESEND_FROM:-onboarding@resend.dev}"
      Resend__FromName: "${RESEND_FROM_NAME:-TriChat}"
      # Extra CORS origins (CSV) to append to the allow-list.
      # E.g. for local dev: http://localhost:5000,http://localhost:3000
      BackendAllowedOrigins: "${BACKEND_ALLOWED_ORIGINS:-}"
      ASPNETCORE_ENVIRONMENT: "Production"

volumes:
  redis_data:
