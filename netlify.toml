[build]
  base    = "frontend"
  command = "rm -rf .flutter && git clone --depth 1 https://github.com/flutter/flutter.git .flutter 2>&1 && export PATH=\"$PWD/.flutter/bin:$PATH\" && flutter precache --web && flutter pub get && flutter build web --release"
  publish = "build/web"

[environment]
  API_BASE_URL = "https://trichat.onrender.com"
  AGORA_APP_ID = ""
  AGORA_APP_CERTIFICATE = ""