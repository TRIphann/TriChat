[build]
  base    = "."
  command = "curl -fsSL https://storage.googleapis.com/flutter_infra_release/releases/stable/linux/flutter_linux_4.0.0-stable.tar.xz | tar xJ && export PATH=\"$PWD/flutter/bin:$PATH\" && cd frontend && flutter pub get && flutter build web --release"
  publish = "frontend/build/web"

[environment]
  API_BASE_URL = "https://trichat.onrender.com"
  AGORA_APP_ID = ""
  AGORA_APP_CERTIFICATE = ""
