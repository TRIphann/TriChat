[build]
  base    = "frontend"
  command = "git clone --depth 1 --branch stable https://github.com/flutter/flutter.git .flutter && export PATH=\"$PWD/.flutter/bin:$PATH\" && flutter pub get && flutter build web --release"
  publish = "build/web"

[environment]
  API_BASE_URL = "https://trichat.onrender.com"
  AGORA_APP_ID = ""
  AGORA_APP_CERTIFICATE = ""