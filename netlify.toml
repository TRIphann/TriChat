[build]
  base    = "."
  command = "wget -q https://storage.googleapis.com/flutter_infra_release/releases/stable/linux/flutter_linux_3.44.5-stable.tar.xz -O flutter.tar.xz && tar xf flutter.tar.xz && export PATH=\"$PWD/flutter/bin:$PATH\" && cd frontend && flutter pub get && flutter build web --release"
  publish = "frontend/build/web"

[environment]
  API_BASE_URL = "https://trichat.onrender.com"
  AGORA_APP_ID = ""
  AGORA_APP_CERTIFICATE = ""
