[build]
  base    = "frontend"
  command = "bash -c 'rm -rf .flutter && git clone --depth 1 -b 3.44.6 https://github.com/flutter/flutter.git .flutter && .flutter/bin/flutter precache --web && .flutter/bin/flutter pub get && .flutter/bin/flutter build web --release'"
  publish = "build/web"

[environment]
  API_BASE_URL = "https://trichat.onrender.com"
  AGORA_APP_ID = ""
  AGORA_APP_CERTIFICATE = ""